<!-- ====================== OWNER + CLIENT FINAL FUNCTIONS ====================== -->

<script>

/* ======================
   GLOBAL VARIABLES
====================== */

let currentClientData = null
let currentUser = null
let currentRole = null

/* ======================
   LOGIN SYSTEM
====================== */

function login(){

let u = document.getElementById('loginUser').value.trim()
let p = document.getElementById('loginPass').value.trim()

if(!u || !p){

alert('اكتب البيانات كاملة')
return

}

/* OWNER LOGIN */

if(u === 'محمد' && p === '111221'){

currentUser='محمد'
currentRole='owner'

document.getElementById('loginScreen')
.classList.remove('active')

document.getElementById('ownerScreen')
.classList.add('active')

loadAll()

saveAccessLog()

return

}

/* CLIENT LOGIN */

firebase.database()
.ref('accounts/'+u)
.once('value')
.then(s=>{

let data=s.val()

if(!data){

alert('الحساب غير موجود')
return

}

if(data.password !== p){

alert('كلمة السر غير صحيحة')
return

}

if(data.freeze === true){

alert('الحساب مجمد من الإدارة')
return

}

currentUser=u
currentRole=data.role

openClient()

saveAccessLog()

})

}

/* ======================
   CLIENT OPEN
====================== */

function openClient(){

document.getElementById('loginScreen')
.classList.remove('active')

document.getElementById('clientScreen')
.classList.add('active')

loadClientData()
loadClientStore()
loadClientChat()
loadClientNotifications()

}

/* ======================
   ACCESS LOGS
====================== */

function saveAccessLog(){

firebase.database()
.ref('logs')
.push({

user:currentUser,
role:currentRole,
time:new Date().toLocaleString('ar-EG'),
device:navigator.userAgent

})

}

/* ======================
   LOGOUT
====================== */

function logout(){

location.reload()

}

/* ======================
   OWNER PAGE NAVIGATION
====================== */

function showPage(id){

document.querySelectorAll('.page')
.forEach(p=>p.style.display='none')

document.getElementById(id)
.style.display='block'

}

/* ======================
   CLIENT PAGE NAVIGATION
====================== */

function showClientPage(id){

document.querySelectorAll('.clientPage')
.forEach(p=>p.style.display='none')

document.getElementById(id)
.style.display='block'

}

/* ======================
   SAVE ACCOUNT
====================== */

function saveAccount(){

let user = document.getElementById('accUser').value.trim()

if(!user){

alert('اكتب اسم العميل')
return

}

let data={

password:document.getElementById('accPass').value,

role:document.getElementById('accRole').value,

qty:Number(document.getElementById('accQty').value||0),

paid:Number(document.getElementById('accPaid').value||0),

expense:Number(document.getElementById('accExpense').value||0),

freeze:false,

createdAt:new Date().toLocaleString('ar-EG')

}

firebase.database()
.ref('accounts/'+user)
.set(data)

alert('تم حفظ الحساب')

}

/* ======================
   LOAD ACCOUNTS
====================== */

function loadAccounts(){

firebase.database()
.ref('accounts')
.on('value',snap=>{

let data=snap.val()||{}

let html=''

let totalProfit=0
let totalDebts=0
let clients=0

for(let key in data){

let d=data[key]

clients++

let paid=Number(d.paid||0)
let expense=Number(d.expense||0)

totalProfit += paid-expense
totalDebts += expense

html += `

<tr>

<td>${key}</td>

<td>${d.role}</td>

<td>${d.qty||0}</td>

<td>${paid.toLocaleString()} ج.م</td>

<td>${expense.toLocaleString()} ج.م</td>

<td>

${d.freeze
?'🔴 مجمد'
:'🟢 نشط'}

</td>

<td>

<button class="printBtn"
onclick="resetBalances('${key}')">

تصفير

</button>

<button class="freezeBtn"
onclick="toggleFreeze('${key}',${d.freeze})">

${d.freeze?'فك':'تجميد'}

</button>

<button class="killBtn"
onclick="deleteAcc('${key}')">

حذف

</button>

</td>

</tr>

`

}

document.getElementById('accountsTable')
.innerHTML=html

document.getElementById('profitCard')
.innerText=totalProfit.toLocaleString()+' ج.م'

document.getElementById('clientsCard')
.innerText=clients

document.getElementById('debtsCard')
.innerText=totalDebts.toLocaleString()+' ج.م'

})

}

/* ======================
   DELETE ACCOUNT
====================== */

function deleteAcc(user){

if(confirm('حذف الحساب نهائياً؟')){

firebase.database()
.ref('accounts/'+user)
.remove()

}

}

/* ======================
   FREEZE / UNFREEZE
====================== */

function toggleFreeze(user,state){

firebase.database()
.ref('accounts/'+user+'/freeze')
.set(!state)

}

/* ======================
   RESET BALANCES
====================== */

function resetBalances(user){

firebase.database()
.ref('accounts/'+user)
.once('value')
.then(s=>{

let d=s.val()

firebase.database()
.ref('archive/'+user+'/'+Date.now())
.set(d)

firebase.database()
.ref('accounts/'+user+'/paid')
.set(0)

firebase.database()
.ref('accounts/'+user+'/expense')
.set(0)

alert('تم تصفير الحساب')

})

}

/* ======================
   ADD STOCK
====================== */

function addStock(){

let client =
document.getElementById('stockClient').value

let product =
document.getElementById('productName').value

let color =
document.getElementById('productColor').value

let size =
document.getElementById('productSize').value

let qty =
Number(document.getElementById('productQty').value)

let price =
Number(document.getElementById('productPrice').value)

let barcode='TL'+Math.floor(Math.random()*999999)

firebase.database()
.ref('stock')
.once('value')
.then(s=>{

let data=s.val()||{}

let foundKey=null

for(let key in data){

let item=data[key]

if(
item.client===client &&
item.product===product &&
item.color===color &&
item.size===size
){

foundKey=key

}

}

if(foundKey){

firebase.database()
.ref('stock/'+foundKey+'/qty')
.set(
Number(data[foundKey].qty)+qty
)

}else{

firebase.database()
.ref('stock/'+Date.now())
.set({

client,
product,
color,
size,
qty,
price,
barcode

})

}

alert('تم حفظ المنتج')

})

}

/* ======================
   LOAD STOCK
====================== */

function loadStock(){

firebase.database()
.ref('stock')
.on('value',snap=>{

let data=snap.val()||{}

let html=''
let count=0

for(let key in data){

count++

let s=data[key]

let low =
Number(s.qty)<5
?'stockLow'
:''

html += `

<tr class="${low}">

<td>${s.client}</td>

<td>${s.product}</td>

<td>${s.color}</td>

<td>${s.size}</td>

<td>${s.qty}</td>

<td>${s.price} ج.م</td>

<td>${s.barcode}</td>

<td>

<button class="printBtn"
onclick="window.print()">

طباعة

</button>

</td>

</tr>

`

}

document.getElementById('stockTable')
.innerHTML=html

document.getElementById('productsCard')
.innerText=count

})

}

/* ======================
   CLIENT DATA
====================== */

function loadClientData(){

firebase.database()
.ref('accounts/'+currentUser)
.on('value',snap=>{

let d=snap.val()

if(!d)return

if(d.freeze===true){

alert('تم تجميد الحساب')

location.reload()

}

document.getElementById('clientWelcome')
.innerHTML='👋 '+currentUser

document.getElementById('clientQtyCard')
.innerText=d.qty||0

document.getElementById('clientPaidCard')
.innerText=
(d.paid||0)+' ج.م'

document.getElementById('clientExpenseCard')
.innerText=
(d.expense||0)+' ج.م'

document.getElementById('clientStateCard')
.innerText=
d.freeze?'مجمد':'نشط'

document.getElementById('profileName')
.innerText=currentUser

document.getElementById('profileRole')
.innerText=d.role

document.getElementById('profileLastLogin')
.innerText=new Date().toLocaleString('ar-EG')

document.getElementById('invoiceClientName')
.innerText=currentUser

document.getElementById('invoiceQty')
.innerText=d.qty||0

document.getElementById('invoicePaid')
.innerText=(d.paid||0)+' ج.م'

document.getElementById('invoiceExpense')
.innerText=(d.expense||0)+' ج.م'

})

}

/* ======================
   CLIENT STORE
====================== */

function loadClientStore(){

firebase.database()
.ref('stock')
.on('value',snap=>{

let data=snap.val()||{}

let html=''

for(let key in data){

let s=data[key]

if(s.client!==currentUser)continue

html += `

<tr>

<td>${s.product}</td>
<td>${s.color}</td>
<td>${s.size}</td>
<td>${s.qty}</td>
<td>${s.price} ج.م</td>
<td>${s.barcode}</td>

</tr>

`

}

document.getElementById('clientStoreTable')
.innerHTML=html

})

}

function filterStore(){

let val=
document.getElementById('storeSearch')
.value.toLowerCase()

document.querySelectorAll('#clientStoreTable tr')
.forEach(row=>{

row.style.display=
row.innerText.toLowerCase().includes(val)
?'':'none'

})

}

/* ======================
   CHAT SYSTEM
====================== */

function sendMessage(){

let txt=
document.getElementById('chatInput').value

if(!txt)return

firebase.database()
.ref('chat')
.push({

user:currentUser,
text:txt,
time:new Date().toLocaleTimeString('ar-EG')

})

document.getElementById('chatInput').value=''

}

function sendClientMessage(){

let txt=
document.getElementById('clientChatInput').value

if(!txt)return

firebase.database()
.ref('chat')
.push({

user:currentUser,
text:txt,
time:new Date().toLocaleTimeString('ar-EG')

})

document.getElementById('clientChatInput').value=''

}

function loadChat(){

firebase.database()
.ref('chat')
.on('value',snap=>{

let data=snap.val()||{}

let html=''

for(let key in data){

let m=data[key]

let cls=
m.user==='محمد'
?'ownerMsg'
:'clientMsg'

html += `

<div class="msg ${cls}">

<b>${m.user}</b>

<br>

${m.text}

<div style="font-size:12px;margin-top:6px">

${m.time}

</div>

</div>

`

}

document.getElementById('chatBox')
.innerHTML=html

document.getElementById('chatBox')
.scrollTop=
document.getElementById('chatBox')
.scrollHeight

})

}

function loadClientChat(){

firebase.database()
.ref('chat')
.on('value',snap=>{

let data=snap.val()||{}

let html=''

for(let key in data){

let m=data[key]

if(
m.user!==currentUser &&
m.user!=='محمد'
)continue

let cls=
m.user==='محمد'
?'ownerMsg'
:'clientMsg'

html += `

<div class="msg ${cls}">

<b>${m.user}</b>

<br>

${m.text}

<div style="font-size:12px;margin-top:6px">

${m.time}

</div>

</div>

`

}

document.getElementById('clientChatBox')
.innerHTML=html

document.getElementById('clientChatBox')
.scrollTop=
document.getElementById('clientChatBox')
.scrollHeight

})

}

/* ======================
   TYPING SYSTEM
====================== */

function typingNow(){

firebase.database()
.ref('typing/'+currentUser)
.set(true)

setTimeout(()=>{

firebase.database()
.ref('typing/'+currentUser)
.set(false)

},1500)

}

firebase.database()
.ref('typing')
.on('value',snap=>{

let data=snap.val()||{}

let txt=''

for(let key in data){

if(data[key]===true){

txt=key+' يكتب الآن...'

}

}

let box=document.getElementById('typingBox')

if(box){

box.innerText=txt

}

})

/* ======================
   NOTIFICATIONS
====================== */

function saveNotification(text){

firebase.database()
.ref('notifications')
.push({

text:text,
time:new Date().toLocaleString('ar-EG')

})

}

function sendNotice(){

let msg=
document.getElementById('noticeInput').value

if(!msg)return

firebase.database()
.ref('notice')
.set(msg)

saveNotification(msg)

playNotificationSound()

let speech=
new SpeechSynthesisUtterance(msg)

speech.lang='ar-EG'

speechSynthesis.speak(speech)

alert('تم إرسال الإشعار')

}

function loadClientNotifications(){

firebase.database()
.ref('notifications')
.on('value',snap=>{

let data=snap.val()||{}

let html=''

for(let key in data){

let n=data[key]

html += `

<div class="notificationItem">

<i class="fa fa-bell"></i>

${n.text}

<div style="font-size:12px;margin-top:8px;color:#94a3b8">

${n.time}

</div>

</div>

`

}

document.getElementById('notificationsList')
.innerHTML=html

})

}

firebase.database()
.ref('notice')
.on('value',snap=>{

let txt=snap.val()

if(!txt)return

let ownerBar=
document.getElementById('globalNoticeBar')

if(ownerBar){

ownerBar.innerText=txt

}

let clientBar=
document.getElementById('clientNoticeBar')

if(clientBar){

clientBar.innerText=txt

}

})

function playNotificationSound(){

let audio=new Audio(
'https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3'
)

audio.play()

}

firebase.database()
.ref('notifications')
.on('child_added',snap=>{

let n=snap.val()

if(Notification.permission==='granted'){

new Notification('إشعار جديد',{

body:n.text

})

}

playNotificationSound()

let speech=
new SpeechSynthesisUtterance(n.text)

speech.lang='ar-EG'

speechSynthesis.speak(speech)

})

/* ======================
   PRINT INVOICE
====================== */

function printInvoice(){

let area=
document.getElementById('invoiceArea')
.innerHTML

let win=window.open()

win.document.write(`

<html>

<head>

<title>فاتورة العميل</title>

<style>

body{
font-family:Cairo;
padding:30px;
direction:rtl;
}

.card{
border:1px solid #ccc;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

</style>

</head>

<body>

${area}

</body>

</html>

`)

win.print()

}

/* ======================
   BACKUP JSON
====================== */

function backupJSON(){

firebase.database()
.ref('/')
.once('value')
.then(snap=>{

let dataStr =
"data:text/json;charset=utf-8," +
encodeURIComponent(
JSON.stringify(snap.val())
)

let a=document.createElement('a')

a.href=dataStr

a.download='TAL3A_BACKUP.json'

a.click()

})

}

/* ======================
   KILL SWITCH
====================== */

function killSystem(){

if(confirm('قطع الاتصال عن جميع الحسابات؟')){

firebase.database()
.ref('systemOff')
.set(true)

alert('تم تنفيذ Kill Switch')

}

}

firebase.database()
.ref('systemOff')
.on('value',snap=>{

if(
snap.val()===true &&
currentUser!=='محمد'
){

alert('تم إيقاف النظام بواسطة الإدارة')

location.reload()

}

})

/* ======================
   LOAD ALL OWNER
====================== */

function loadAll(){

loadAccounts()
loadStock()
loadChat()

}

/* ======================
   NETWORK STATUS
====================== */

window.addEventListener('offline',()=>{

let x=document.getElementById('onlineStatus')

if(x){

x.innerHTML='🔴 غير متصل'

}

})

window.addEventListener('online',()=>{

let x=document.getElementById('onlineStatus')

if(x){

x.innerHTML='🟢 متصل'

}

})

/* ======================
   NOTIFICATION PERMISSION
====================== */

if(Notification.permission!=='granted'){

Notification.requestPermission()

}

</script>
