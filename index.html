<!-- ======================= قسم مخزن العميل الاحترافي ======================= -->

<style>

.stockCard{

background:#0f172a;
padding:25px;
border-radius:25px;
margin-top:25px;
box-shadow:0 10px 40px rgba(0,0,0,.4);

}

.stockHeader{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;

}

.stockHeader h2{

font-size:28px;
color:#fff;

}

.stockBtns{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.stockTable{

width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:20px;

}

.stockTable thead{

background:linear-gradient(90deg,#2563eb,#1d4ed8);

}

.stockTable th{

padding:18px;
color:white;
font-size:15px;

}

.stockTable td{

padding:16px;
background:#111827;
border-bottom:1px solid rgba(255,255,255,.06);
text-align:center;

}

.stockTable tr:hover td{

background:#172033;

}

.stockInput{

width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;

}

.printArea{

display:none;
padding:30px;
background:white;
color:black;

}

.printTitle{

text-align:center;
margin-bottom:20px;

}

.printTable{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

.printTable th,
.printTable td{

border:1px solid black;
padding:12px;
text-align:center;

}

.badgeQty{

background:#2563eb;
padding:8px 14px;
border-radius:10px;
font-weight:bold;

}

.badgeMoney{

background:#059669;
padding:8px 14px;
border-radius:10px;
font-weight:bold;

}

.badgeDanger{

background:#dc2626;
padding:8px 14px;
border-radius:10px;
font-weight:bold;

}

@media print{

body *{

display:none !important;

}

#printStockArea,
#printStockArea *{

display:block !important;

}

.printTable,
.printTable *{

display:table !important;

}

.printTable tr{

display:table-row !important;

}

.printTable td,
.printTable th{

display:table-cell !important;

}

}

</style>

<!-- ======================= داخل لوحة العميل ======================= -->

<div class="stockCard">

<div class="stockHeader">

<h2>
📦 مخزن العميل الخاص
</h2>

<div class="stockBtns">

<button class="btnPrimary"
onclick="printClientStock()">

🖨️ طباعة الجرد

</button>

<button class="btnSuccess"
onclick="loadClientProducts()">

🔄 تحديث

</button>

</div>

</div>

<div class="tableWrap">

<table class="stockTable"
id="clientProductsTable">

<thead>

<tr>

<th>اسم المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<!-- ======================= داخل لوحة المالك ======================= -->

<div class="stockCard">

<div class="stockHeader">

<h2>
🏪 إدارة مخازن العملاء
</h2>

</div>

<div class="cards">

<div class="inputBox">

<input class="stockInput"
type="text"
id="stock-user"
placeholder="اسم العميل">

</div>

<div class="inputBox">

<input class="stockInput"
type="text"
id="stock-product"
placeholder="اسم المنتج">

</div>

<div class="inputBox">

<input class="stockInput"
type="number"
id="stock-qty"
placeholder="الكمية">

</div>

<div class="inputBox">

<input class="stockInput"
type="number"
id="stock-price"
placeholder="السعر">

</div>

</div>

<br>

<div class="stockBtns">

<button class="btnSuccess"
onclick="addStockItem()">

➕ إضافة للمخزن

</button>

<button class="btnWarning"
onclick="updateStockItem()">

✏️ تعديل

</button>

</div>

</div>

<!-- ======================= قالب الطباعة ======================= -->

<div id="printStockArea"
class="printArea">

<div class="printTitle">

<h1>
📦 تقرير جرد المخزن
</h1>

<h3 id="printClientName"></h3>

<p id="printDate"></p>

</div>

<table class="printTable">

<thead>

<tr>

<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>

</tr>

</thead>

<tbody id="printStockBody"></tbody>

</table>

<br><br>

<h2 id="printTotal"></h2>

</div>

<script>

/* ======================= إضافة منتج ======================= */

function addStockItem(){

const user=
document.getElementById("stock-user").value.trim();

const product=
document.getElementById("stock-product").value.trim();

const qty=
parseInt(document.getElementById("stock-qty").value)||0;

const price=
parseInt(document.getElementById("stock-price").value)||0;

if(!user || !product){

showToast("اكمل البيانات");

return;

}

db.ref("products/"+user).push({

product:product,
qty:qty,
price:price,
total:qty*price,
createdAt:Date.now()

}).then(()=>{

showToast("تم إضافة المنتج للمخزن");

});

}

/* ======================= تعديل منتج ======================= */

function updateStockItem(){

const user=
document.getElementById("stock-user").value.trim();

db.ref("products/"+user).once("value",snap=>{

if(!snap.exists()){

showToast("لا يوجد مخزن");

return;

}

showToast("افتح Firebase وعدل المنتج مباشرة");

});

}

/* ======================= تحميل مخزن العميل ======================= */

function loadClientProducts(){

db.ref("products/"+authUser).on("value",snap=>{

const body=
document.querySelector("#clientProductsTable tbody");

body.innerHTML="";

let totalMoney=0;
let totalQty=0;

snap.forEach(data=>{

const d=data.val();

totalMoney+=Number(d.total||0);
totalQty+=Number(d.qty||0);

body.innerHTML+=`

<tr>

<td>
${d.product}
</td>

<td>
<span class="badgeQty">
${d.qty}
</span>
</td>

<td>
<span class="badgeMoney">
${d.price} ج
</span>
</td>

<td>
<span class="badgeDanger">
${d.total} ج
</span>
</td>

</tr>

`;

});

body.innerHTML+=`

<tr>

<td colspan="4">

<div style="
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:15px;
">

<div class="badgeQty">
إجمالي القطع :
${totalQty}
</div>

<div class="badgeMoney">
إجمالي القيمة :
${totalMoney} ج
</div>

</div>

</td>

</tr>

`;

});

}

/* ======================= طباعة الجرد ======================= */

function printClientStock(){

db.ref("products/"+authUser).once("value",snap=>{

const body=
document.getElementById("printStockBody");

body.innerHTML="";

let total=0;

snap.forEach(data=>{

const d=data.val();

total+=Number(d.total||0);

body.innerHTML+=`

<tr>

<td>${d.product}</td>
<td>${d.qty}</td>
<td>${d.price} ج</td>
<td>${d.total} ج</td>

</tr>

`;

});

document.getElementById("printClientName").innerText=
"العميل : "+authUser;

document.getElementById("printDate").innerText=
new Date().toLocaleString();

document.getElementById("printTotal").innerText=
"إجمالي المخزن : "+total+" ج";

window.print();

});

}

/* ======================= حبشتكنات ======================= */

setInterval(()=>{

document.title=
"🔥 TAL3A ERP | "+new Date().toLocaleTimeString();

},1000);

/* تأثير عند الدخول */

document.body.style.opacity="0";

setTimeout(()=>{

document.body.style.transition="1s";
document.body.style.opacity="1";

},300);

/* إشعار صوتي */

function playNotify(){

new Audio(
"https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73467.mp3"
).play();

}

/* إشعار احترافي */

function proToast(msg){

showToast("🔥 "+msg);

playNotify();

}

/* حماية بسيطة */

document.addEventListener("keydown",e=>{

if(e.key==="F12"){

e.preventDefault();

proToast("ممنوع فتح أدوات المطور");

}

});

/* تحديث لحظي */

db.ref("products").on("value",()=>{

if(authRole==="client"){

loadClientProducts();

}

});

</script>
